name: Download Street View Panoramas

on:
  workflow_dispatch:
    inputs:
      street:
        description: 'Strassenname (z. B. Berger Strasse) ODER Koordinaten "lat,lng"'
        required: false
        default: ''
      city:
        description: 'Stadt (z. B. Frankfurt am Main) — leer lassen bei Koordinaten'
        required: false
        default: ''
      lat:
        description: 'Breitengrad (z. B. 49.037876) — Alternative zu street/city'
        required: false
        default: ''
      lng:
        description: 'Laengengrad (z. B. 12.128140) — Alternative zu street/city'
        required: false
        default: ''
      pano_ids:
        description: 'Kommagetrennte pano_ids (optional, ueberspringt Suche)'
        required: false
        default: ''
      quality:
        description: 'Bildqualitaet (low=32 Tiles, medium=128 Tiles, high=512 Tiles)'
        required: true
        default: 'medium'
        type: choice
        options:
          - low
          - medium
          - high
      sampling:
        description: 'Sampling-Abstand in Metern (5=vollstaendig, 15=schneller, 30=grob)'
        required: true
        default: '10'
      radius:
        description: 'Suchradius pro Punkt in Metern'
        required: true
        default: '8'
      historical:
        description: 'Historische Aufnahmen laden (alle Epochen, ~2.5x mehr Tiles)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      date_from:
        description: 'Historisch: Datum von (YYYY-MM, leer = kein Filter)'
        required: false
        default: ''
      date_to:
        description: 'Historisch: Datum bis (YYYY-MM, leer = kein Filter)'
        required: false
        default: ''
      heading:
        description: 'Blickrichtung Heading in Grad (0=Nord, 90=Ost, 180=Sued, 270=West)'
        required: false
        default: '0'
      pitch:
        description: 'Neigung Pitch in Grad (0=horizontal, 90=hoch, -90=runter)'
        required: false
        default: '0'
      fov:
        description: 'Field of View in Grad (10-120, Standard=90)'
        required: false
        default: '90'
      zoom:
        description: 'Zoom-Level (0=Weitwinkel bis 5=Tele)'
        required: false
        default: '2'
      source:
        description: 'Quelle filtern (leer=alle, google=nur Google, user=nur User)'
        required: false
        default: ''
      outdoor:
        description: 'Nur Outdoor-Aufnahmen'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - 'true'
          - 'false'
      max_age_months:
        description: 'Max. Alter in Monaten (leer = kein Filter)'
        required: false
        default: ''
      output_format:
        description: 'Ausgabeformat'
        required: false
        default: 'jpg'
        type: choice
        options:
          - jpg
          - png
          - webp
      jpg_quality:
        description: 'JPEG-Qualitaet in % (10-100)'
        required: false
        default: '85'
      api_key:
        description: 'Google Maps API Key'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow streetview-dl
          echo "[OK] Pakete installiert"
          streetview-dl --version || echo "[WARN] streetview-dl version check failed"

      - name: Prepare pano_ids file
        run: |
          PANO_IDS="${{ github.event.inputs.pano_ids }}"
          if [ -n "$PANO_IDS" ]; then
            echo "[" > /tmp/pano_ids.json
            echo "$PANO_IDS" | tr ',' '\n' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | \
              awk '{print "\"" $0 "\","}' | sed '$ s/,$//' >> /tmp/pano_ids.json
            echo "]" >> /tmp/pano_ids.json
            echo "[OK] pano_ids.json erstellt:"
            cat /tmp/pano_ids.json
          else
            echo "[INFO] Keine pano_ids angegeben - Discovery-Modus"
          fi

      - name: Resolve street from coordinates if needed
        run: |
          LAT="${{ github.event.inputs.lat }}"
          LNG="${{ github.event.inputs.lng }}"
          STREET="${{ github.event.inputs.street }}"
          if [ -n "$LAT" ] && [ -n "$LNG" ] && [ -z "$STREET" ]; then
            echo "DISPATCH_STREET=${LAT},${LNG}" >> $GITHUB_ENV
            echo "DISPATCH_CITY=" >> $GITHUB_ENV
            echo "[INFO] Koordinaten-Modus: $LAT,$LNG"
          elif [ -n "$STREET" ]; then
            echo "DISPATCH_STREET=${STREET}" >> $GITHUB_ENV
            echo "DISPATCH_CITY=${{ github.event.inputs.city }}" >> $GITHUB_ENV
            echo "[INFO] Strassen-Modus: $STREET, ${{ github.event.inputs.city }}"
          else
            echo "DISPATCH_STREET=unbekannt" >> $GITHUB_ENV
            echo "DISPATCH_CITY=" >> $GITHUB_ENV
            echo "[WARN] Weder street noch lat/lng angegeben"
          fi

      - name: Run headless downloader
        env:
          GOOGLE_MAPS_API_KEY: ${{ github.event.inputs.api_key }}
        run: |
          PANO_IDS="${{ github.event.inputs.pano_ids }}"
          PANO_FLAG=""
          if [ -n "$PANO_IDS" ]; then
            PANO_FLAG="--pano-ids-file /tmp/pano_ids.json"
          fi

          python streetview_headless.py \
            --street   "${{ env.DISPATCH_STREET }}" \
            --city     "${{ env.DISPATCH_CITY }}" \
            --quality  "${{ github.event.inputs.quality }}" \
            --sampling "${{ github.event.inputs.sampling }}" \
            --radius   "${{ github.event.inputs.radius }}" \
            --historical "${{ github.event.inputs.historical }}" \
            --heading  "${{ github.event.inputs.heading }}" \
            --pitch    "${{ github.event.inputs.pitch }}" \
            --fov      "${{ github.event.inputs.fov }}" \
            --zoom     "${{ github.event.inputs.zoom }}" \
            --output-format "${{ github.event.inputs.output_format }}" \
            --jpg-quality   "${{ github.event.inputs.jpg_quality }}" \
            --date-from     "${{ github.event.inputs.date_from }}" \
            --date-to       "${{ github.event.inputs.date_to }}" \
            --max-age-months "${{ github.event.inputs.max_age_months }}" \
            --source        "${{ github.event.inputs.source }}" \
            --outdoor       "${{ github.event.inputs.outdoor }}" \
            --output ./panoramas \
            $PANO_FLAG

      - name: List downloaded files
        run: |
          echo "=== Heruntergeladene Dateien ==="
          find ./panoramas -type f | sort
          TOTAL=$(find ./panoramas -type f | wc -l)
          SIZE=$(du -sh ./panoramas 2>/dev/null | cut -f1)
          echo "Gesamt: $TOTAL Dateien, Groesse: $SIZE"

      - name: Generate summary
        run: |
          TOTAL=$(find ./panoramas -type f | wc -l)
          SIZE=$(du -sh ./panoramas 2>/dev/null | cut -f1)
          echo "## StreetView Download Ergebnis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Wert |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Strasse   | ${{ env.DISPATCH_STREET }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stadt     | ${{ env.DISPATCH_CITY }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Qualitaet | ${{ github.event.inputs.quality }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dateien   | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Groesse   | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Zeitstempel | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

      - name: Upload panoramas as artifact
        uses: actions/upload-artifact@v4
        with:
          name: panoramas-${{ env.DISPATCH_STREET }}-${{ github.run_number }}
          path: ./panoramas/
          retention-days: 7
          if-no-files-found: warn
