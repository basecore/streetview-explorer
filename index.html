<script>
const APP_VERSION='v3.7',LOCAL_API='http://localhost:5000';
const TAB_IDS=['tab-map','tab-config','tab-tokens','tab-quota','tab-jobs','tab-debug'];
let mode='local',jobsMode='local',mapDrawMode='click';
let drawnLine=null,linePoints=[],singleMarker=null,gpsMarker=null;
let foundPanos=[],currentJobId=null,currentES=null,serverOnline=false;
let gpsLat=null,gpsLng=null,gpsAddr='';
let hasPoint=false,hasLine=false;

/* ── CRYPTO ── */
const CRYPTO_SALT='svex-v3.7-salt-x9k2';
async function deriveKey(password){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(password+CRYPTO_SALT),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode(CRYPTO_SALT),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptValue(pt){
  const fp=navigator.userAgent+navigator.language;
  const key=await deriveKey(fp);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(pt));
  const c=new Uint8Array(iv.byteLength+ct.byteLength);c.set(iv,0);c.set(new Uint8Array(ct),iv.byteLength);
  return btoa(String.fromCharCode(...c));
}
async function decryptValue(b64){
  try{
    const fp=navigator.userAgent+navigator.language;
    const key=await deriveKey(fp);
    const c=Uint8Array.from(atob(b64),x=>x.charCodeAt(0));
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:c.slice(0,12)},key,c.slice(12));
    return new TextDecoder().decode(pt);
  }catch{return '';}
}
async function saveSecureKey(name,val){if(!val){localStorage.removeItem('svex_sec_'+name);return;}localStorage.setItem('svex_sec_'+name,await encryptValue(val));}
async function loadSecureKey(name){const e=localStorage.getItem('svex_sec_'+name);if(!e)return '';return decryptValue(e);}
async function saveAllKeys(){await saveSecureKey('google',v('tok-google'));await saveSecureKey('pat',v('tok-pat'));setStatus('API-Keys verschlüsselt gespeichert ✓','success');dbg('Keys gespeichert (AES-256-GCM, gerätegebunden)','ok');}
async function loadAllKeys(){const g=await loadSecureKey('google');const p=await loadSecureKey('pat');if(g){document.getElementById('tok-google').value=g;dbg('Google Key geladen','ok');}if(p){document.getElementById('tok-pat').value=p;dbg('GitHub PAT geladen','ok');}if(g||p)setStatus('Gespeicherte API-Keys geladen ✓','success');}
function clearAllKeys(){if(!confirm('Gespeicherte API-Keys wirklich löschen?'))return;localStorage.removeItem('svex_sec_google');localStorage.removeItem('svex_sec_pat');document.getElementById('tok-google').value='';document.getElementById('tok-pat').value='';setStatus('API-Keys gelöscht.','warn');dbg('Gespeicherte Keys gelöscht','warn');}

/* ── QUOTA ── */
const QK='svex_quota';
function quotaData(){const d=localStorage.getItem(QK);if(d)try{return JSON.parse(d);}catch{}const n=new Date();return{month:`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`,used:0,limit:100000,stopPct:80};}
function saveQuotaData(d){localStorage.setItem(QK,JSON.stringify(d));}

/* ── LOG ── */
const LV={cmd:'dl-cmd',ok:'dl-ok',err:'dl-err',warn:'dl-warn',info:'dl-info',log:'dl'};
function dbg(msg,level='log'){
  const el=document.getElementById('debug-log');
  const sp=document.createElement('span');
  sp.className=LV[level]||'dl';
  sp.textContent=`[${new Date().toLocaleTimeString()}]  ${msg}\n`;
  el.appendChild(sp);el.scrollTop=el.scrollHeight;
}
function clearDebugLog(){document.getElementById('debug-log').innerHTML='';}
function copyLog(){navigator.clipboard.writeText(document.getElementById('debug-log').innerText).then(()=>setStatus('Kopiert.','success'));}

/* ── UI ── */
function showTab(id){
  TAB_IDS.forEach(t=>document.getElementById(t).classList.toggle('active',t===id));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',TAB_IDS[i]===id));
  TAB_IDS.forEach(t=>{const m=document.getElementById('mobt-'+t);if(m)m.classList.toggle('active',t===id);});
  if(id==='tab-jobs'){loadLocalJobs();if(jobsMode==='cloud'){if(_cloudJobsRefreshTimer)clearTimeout(_cloudJobsRefreshTimer);loadCloudJobs();}}
}
function setStatus(msg,type='running'){
  const b=document.getElementById('status-bar');
  b.style.display='block';b.className=type;
  b.innerHTML=(type==='running'?'<span class="spin"></span>':'')+msg;
}
function v(id){return(document.getElementById(id)||{}).value?.trim()||'';}
function togglePw(id){const e=document.getElementById(id);e.type=e.type==='password'?'text':'password';}
function escH(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ── MODE ── */
function setMode(m){
  mode=m;
  document.getElementById('msw-local').className='msw-btn'+(m==='local'?' act-local':'');
  document.getElementById('msw-cloud').className='msw-btn'+(m==='cloud'?' act-cloud':'');
  document.getElementById('btn-dl-local').style.display=m==='local'?'inline-flex':'none';
  document.getElementById('btn-dl-cloud').style.display=m==='cloud'?'inline-flex':'none';
  dbg(`Modus: ${m}`,'info');
  setJobsMode(m==='cloud'?'cloud':'local');
  checkServer();
}
function setJobsMode(m){
  jobsMode=m;
  document.getElementById('jobs-local').style.display=m==='local'?'block':'none';
  document.getElementById('jobs-cloud').style.display=m==='cloud'?'block':'none';
  document.getElementById('jobsw-local').className='msw-btn'+(m==='local'?' act-local':'');
  document.getElementById('jobsw-cloud').className='msw-btn'+(m==='cloud'?' act-cloud':'');
  if(m==='cloud')loadCloudJobs();else loadLocalJobs();
}

/* ── ACTION BAR ── */
function updateActionBar(){
  const bar=document.getElementById('action-bar');
  const txt=document.getElementById('action-hint-text');
  if(hasPoint){bar.style.display='block';txt.textContent='Punkt gesetzt \u2014 Panoramen in der N\u00e4he suchen';}
  else if(hasLine){bar.style.display='block';txt.textContent=`Linie (${linePoints.length} Pkt.) \u2014 Panoramen entlang suchen`;}
  else{bar.style.display='none';}
}
function updateLineHint(){
  const bar=document.getElementById('line-hint-bar');
  if(mapDrawMode==='line'&&linePoints.length>0){bar.style.display='flex';document.getElementById('line-hint-text').textContent=`${linePoints.length} Punkt(e) \u2014 Doppeltippen oder:`;}
  else{bar.style.display='none';}
}

/* ── MAP ── */
const map=L.map('map',{tap:true}).setView([50.11,8.68],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; <a href="https://openstreetmap.org">OSM</a>',maxZoom:19}).addTo(map);
const panoLayer=L.layerGroup().addTo(map);
map.on('click',e=>{if(mapDrawMode==='click')placeSingleMarker(e.latlng);else if(mapDrawMode==='line')addLinePoint(e.latlng);});
map.on('dblclick',e=>{if(mapDrawMode==='line'){L.DomEvent.stop(e);finishLine();}});
map.on('mousemove',e=>{document.getElementById('coord-display').textContent=`${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;});

function mapMode(m){
  mapDrawMode=m;
  ['click','line','street'].forEach(k=>{const b=document.getElementById('mapbtn-'+k);if(!b)return;b.style.background=k===m?'var(--primary)':'';b.style.color=k===m?'#fff':'';});
  document.getElementById('street-search-bar').style.display=m==='street'?'block':'none';
  document.getElementById('line-hint-bar').style.display='none';
  if(m==='line')setStatus('Punkte setzen. Doppeltippen oder Button zum Abschlie\u00dfen.','running');
  if(m==='click')setStatus('Punkt auf die Karte tippen.','running');
  if(m==='street')document.getElementById('street-input').focus();
}
function placeSingleMarker(latlng){
  if(singleMarker)map.removeLayer(singleMarker);
  singleMarker=L.marker([latlng.lat,latlng.lng]).addTo(map);
  hasPoint=true;hasLine=false;
  document.getElementById('coord-display').textContent=`${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
  dbg(`Punkt: ${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`,'info');
  foundPanos=[];updatePanoBar();updateActionBar();
  setStatus('Punkt gesetzt \u2014 jetzt \u201ePanoramen suchen\u201c dr\u00fccken.','success');
}
function addLinePoint(latlng){
  linePoints.push(latlng);
  if(drawnLine)map.removeLayer(drawnLine);
  if(linePoints.length>=2)drawnLine=L.polyline(linePoints,{color:'#4f9aaa',weight:3,opacity:.85}).addTo(map);
  L.circleMarker([latlng.lat,latlng.lng],{radius:4,color:'#4f9aaa',fillColor:'#4f9aaa',fillOpacity:1}).addTo(panoLayer);
  dbg(`Linienpunkt ${linePoints.length}: ${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`,'info');
  updateLineHint();
  setStatus(`${linePoints.length} Punkte \u2014 Doppeltippen oder Linie abschlie\u00dfen.`,'running');
}
function finishLine(){
  if(linePoints.length<2){setStatus('Mindestens 2 Punkte n\u00f6tig.','warn');return;}
  hasLine=true;hasPoint=false;
  document.getElementById('line-hint-bar').style.display='none';
  updateActionBar();
  dbg(`Linie: ${linePoints.length} Punkte`,'ok');
  setStatus(`Linie (${linePoints.length} Punkte) \u2014 jetzt \u201ePanoramen suchen\u201c dr\u00fccken.`,'success');
}
function clearMap(){
  if(singleMarker){map.removeLayer(singleMarker);singleMarker=null;}
  if(drawnLine){map.removeLayer(drawnLine);drawnLine=null;}
  panoLayer.clearLayers();linePoints=[];foundPanos=[];hasPoint=false;hasLine=false;
  updatePanoBar();updateActionBar();
  document.getElementById('line-hint-bar').style.display='none';
  dbg('Karte geleert','info');setStatus('Geleert.','success');
}

/* ── SUCHE STARTEN ── */
function startSearch(){
  const key=v('tok-google');
  if(!key){setStatus('Google API-Key im Keys-Tab eingeben.','error');showTab('tab-tokens');return;}
  if(hasPoint&&singleMarker){
    const ll=singleMarker.getLatLng();
    linePoints=[ll,L.latLng(ll.lat+0.00001,ll.lng+0.00001)];
    dbg(`Einzelpunkt-Suche: ${ll.lat.toFixed(6)}, ${ll.lng.toFixed(6)}`,'info');
  }
  if(!linePoints.length){setStatus('Kein Punkt oder Linie gesetzt.','warn');return;}
  discoverPanosAlongLine();
}

/* ── GPS ── */
function getGPS(){
  if(!navigator.geolocation){setStatus('GPS nicht verf\u00fcgbar.','error');return;}
  setStatus('GPS wird abgefragt...','running');
  dbg('Geolocation gestartet','info');
  navigator.geolocation.getCurrentPosition(async pos=>{
    gpsLat=pos.coords.latitude;gpsLng=pos.coords.longitude;
    const acc=pos.coords.accuracy;
    dbg(`GPS: ${gpsLat.toFixed(6)}, ${gpsLng.toFixed(6)} \u00b1${acc.toFixed(0)}m`,'ok');
    setStatus(`Standort gefunden (\u00b1${acc.toFixed(0)}m)`,'success');
    if(gpsMarker)map.removeLayer(gpsMarker);
    gpsMarker=L.circleMarker([gpsLat,gpsLng],{radius:10,color:'#7c4dff',fillColor:'#7c4dff',fillOpacity:.6,weight:2}).addTo(map);
    map.setView([gpsLat,gpsLng],16);
    document.getElementById('gps-card').style.display='block';
    document.getElementById('gps-coords').textContent=`${gpsLat.toFixed(6)}, ${gpsLng.toFixed(6)} (\u00b1${acc.toFixed(0)}m)`;
    document.getElementById('gps-addr').textContent='Adresse wird gesucht...';
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${gpsLat}&lon=${gpsLng}&format=json`,{headers:{'User-Agent':'svex/3.7'}});
      const d=await r.json();
      gpsAddr=d.display_name||`${gpsLat.toFixed(5)}, ${gpsLng.toFixed(5)}`;
      const a=d.address||{};
      const short=[a.road,a.house_number,a.city||a.town||a.village].filter(Boolean).join(' ');
      document.getElementById('gps-addr').textContent='\uD83D\uDCCD '+escH(short||gpsAddr);
      gpsMarker.bindPopup(`<b>${escH(short)}</b><br><small>${gpsLat.toFixed(5)}, ${gpsLng.toFixed(5)}</small>`).openPopup();
      dbg(`Adresse: ${short}`,'ok');
    }catch(e){gpsAddr=`${gpsLat.toFixed(5)}, ${gpsLng.toFixed(5)}`;document.getElementById('gps-addr').textContent=gpsAddr;dbg(`Geocode Fehler: ${e}`,'warn');}
  },err=>{dbg(`GPS Fehler: ${err.message}`,'err');setStatus(`GPS: ${err.message}`,'error');},{enableHighAccuracy:true,timeout:10000});
}
function useGpsAsPoint(){if(gpsLat===null){setStatus('Kein GPS.','warn');return;}placeSingleMarker(L.latLng(gpsLat,gpsLng));map.setView([gpsLat,gpsLng],17);}
function useGpsAddrSearch(){if(!gpsAddr){setStatus('Kein GPS.','warn');return;}document.getElementById('street-input').value=gpsAddr;mapMode('street');geocodeStreet();}

/* ── GEOCODE ── */
async function geocodeStreet(){
  const q=v('street-input');if(!q)return;
  dbg(`Geocode: ${q}`,'info');setStatus(`Suche: ${q}...`,'running');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&polygon_geojson=1&limit=1`,{headers:{'User-Agent':'svex/3.7'}});
    const data=await r.json();
    if(!data.length){setStatus('Nicht gefunden. Tipp: Exakten Strassennamen + Stadt eingeben (z.B. Berger Strasse, Frankfurt am Main)','warn');return;}
    const geo=data[0].geojson||{},t=geo.type,c=geo.coordinates||[];
    dbg(`Geocode OK: ${data[0].display_name} (${t})`,'ok');
    linePoints=[];if(drawnLine){map.removeLayer(drawnLine);drawnLine=null;}panoLayer.clearLayers();
    let pts=[];
    if(t==='LineString')pts=c.map(([lo,la])=>L.latLng(la,lo));
    else if(t==='MultiLineString')pts=c.flat().map(([lo,la])=>L.latLng(la,lo));
    else{const bb=data[0].boundingbox;pts=[L.latLng((+bb[0]+ +bb[1])/2,(+bb[2]+ +bb[3])/2)];}
    if(pts.length>=2){
      linePoints=pts;drawnLine=L.polyline(pts,{color:'#c9813a',weight:3}).addTo(map);
      map.fitBounds(drawnLine.getBounds(),{padding:[20,20]});
      hasLine=true;hasPoint=false;updateActionBar();
      setStatus(`${q} gefunden \u2014 \u201ePanoramen suchen\u201c dr\u00fccken.`,'success');
    }else if(pts.length===1){placeSingleMarker(pts[0]);map.setView(pts[0],17);}
  }catch(e){dbg(`Geocode Fehler: ${e}`,'err');setStatus(`Fehler: ${e}`,'error');}
}

/* ── PANORAMA DISCOVERY (v3.7: echte StreetView-Metadaten-API) ── */
async function queryPanosBrowser(lat, lng, radius, key) {
  // Google Street View Metadata API — kein Billing nötig, kostenlos
  const url = `https://maps.googleapis.com/maps/api/streetview/metadata?location=${lat},${lng}&radius=${radius}&key=${key}&source=outdoor`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (d.status === 'OK' && d.pano_id) {
      return [{
        pano_id: d.pano_id,
        lat:     d.location?.lat  || lat,
        lng:     d.location?.lng  || lng,
        date:    d.date           || '?',
        url:     `https://www.google.com/maps/@${d.location?.lat||lat},${d.location?.lng||lng},3a,75y,0h,90t/`
      }];
    }
    return [];
  } catch(e) {
    dbg(`Metadata-API Fehler: ${e}`, 'warn');
    return [];
  }
}

async function discoverPanosAlongLine(){
  const key=v('tok-google');
  if(!key){setStatus('API-Key fehlt.','error');return;}
  const sampling=parseInt(v('cfg-sampling'))||10,radius=parseInt(v('cfg-radius'))||8;
  const pts=linePoints.map(p=>({lat:p.lat,lng:p.lng}));
  const samples=pts.length>1?interpolate(pts,sampling):pts;
  dbg(`Suche: ${samples.length} Samples, alle ${sampling}m, Server=${serverOnline}`,'info');
  setStatus(`<span class="spin"></span>Suche ${samples.length} Punkte...`,'running');
  document.getElementById('action-bar').style.display='none';
  foundPanos=[];panoLayer.clearLayers();const seen=new Set();

  for(let i=0;i<samples.length;i++){
    const p=samples[i];
    try{
      let panos=[];
      if(serverOnline){
        const res=await fetch(`${LOCAL_API}/api/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lat:p.lat,lng:p.lng,radius,api_key:key})});
        const d=await res.json();panos=d.panoramas||[];
        dbg(`P${i}: ${panos.length} Panos vom Server`,'info');
      } else {
        // ── v3.7: echte Metadata-API statt Fake-ID ──
        panos = await queryPanosBrowser(p.lat, p.lng, radius, key);
        if(panos.length > 0){
          dbg(`P${i}: status=OK pano_id=${panos[0].pano_id.substring(0,16)}...`,'ok');
        } else {
          dbg(`P${i}: kein Panorama gefunden (radius=${radius}m)`,'warn');
        }
      }
      for(const pano of panos){
        if(!seen.has(pano.pano_id)){
          seen.add(pano.pano_id);
          pano._selected=true;
          foundPanos.push(pano);
          const col=serverOnline?'#68a83f':'#4f9aaa';
          const marker=L.circleMarker([pano.lat||p.lat,pano.lng||p.lng],{radius:7,color:col,fillColor:col,fillOpacity:.8,weight:2})
            .bindPopup(
              `<b style="font-size:.85rem">${escH(pano.pano_id)}</b><br>`+
              `<span style="color:#888;font-size:.75rem">Datum: ${escH(pano.date||'?')}</span><br>`+
              `<span style="font-size:.75rem">${(pano.lat||p.lat).toFixed(5)}, ${(pano.lng||p.lng).toFixed(5)}</span><br>`+
              (pano.url?`<a href="${escH(pano.url)}" target="_blank" style="font-size:.75rem;color:#4f9aaa">Google Maps &#8599;</a>`:'')
            )
            .addTo(panoLayer);
          pano._marker=marker;
        }
      }
    }catch(e){dbg(`Fehler P${i}: ${e}`,'err');}
    if(i%5===0)updatePanoBar();
  }

  updatePanoBar();updateActionBar();
  if(!serverOnline){
    const realCount=foundPanos.filter(p=>!p.pano_id.startsWith('pos_')).length;
    if(realCount>0){
      setStatus(`${foundPanos.length} echte Panoramen gefunden (Browser-Modus). Cloud-Download möglich.`,'success');
      dbg(`Suche fertig: ${foundPanos.length} echte pano_ids via Metadata-API`,'ok');
    } else {
      setStatus(`${foundPanos.length} Positionen — keine Panoramen im Umkreis gefunden.`,'warn');
      dbg('Tipp: Suchradius erhöhen oder anderen Punkt wählen.','warn');
    }
  } else {
    setStatus(`${foundPanos.length} Panoramen gefunden \u2014 Ausw\u00e4hlen und \u201eLokal laden\u201c dr\u00fccken.`,'success');
    dbg(`Suche fertig: ${foundPanos.length} Panoramen`,'ok');
  }
}

function interpolate(pts,everyM){
  if(pts.length<2)return pts;
  const out=[pts[0]];let carry=0;
  for(let i=1;i<pts.length;i++){
    const seg=haversine(pts[i-1].lat,pts[i-1].lng,pts[i].lat,pts[i].lng);
    if(!seg)continue;
    let d=carry;
    while(d+everyM<=seg){d+=everyM;const r=d/seg;out.push({lat:pts[i-1].lat+(pts[i].lat-pts[i-1].lat)*r,lng:pts[i-1].lng+(pts[i].lng-pts[i-1].lng)*r});}
    carry=seg-d;
  }
  if(out[out.length-1]!==pts[pts.length-1])out.push(pts[pts.length-1]);
  return out;
}
function haversine(la1,lo1,la2,lo2){
  const R=6371000,p1=la1*Math.PI/180,p2=la2*Math.PI/180;
  const a=Math.sin((p2-p1)/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin((lo2-lo1)*Math.PI/360)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── PANO TABELLE ── */
function updatePanoBar(){
  const bar=document.getElementById('pano-found-bar');
  if(!foundPanos.length){bar.style.display='none';return;}
  bar.style.display='block';
  const selCount=foundPanos.filter(p=>p._selected).length;
  const fakeCount=foundPanos.filter(p=>p.pano_id.startsWith('pos_')).length;
  document.getElementById('pano-count-label').textContent=
    `${foundPanos.length} Panoramen gefunden`+
    (fakeCount?` (${fakeCount} Fallback)`:'')+
    (!serverOnline?' — Browser-Modus':'');
  document.getElementById('sel-bar').style.display='flex';
  document.getElementById('sel-count').textContent=selCount;
  document.getElementById('btn-export-csv').style.display=selCount>0?'inline-flex':'none';
  const cbAll=document.getElementById('cb-all');
  if(cbAll){cbAll.checked=selCount===foundPanos.length&&foundPanos.length>0;cbAll.indeterminate=selCount>0&&selCount<foundPanos.length;}
  const alreadyDone=JSON.parse(localStorage.getItem('svex_dispatched_panos')||'[]');
  document.getElementById('pano-tbody').innerHTML=foundPanos.map((p,i)=>{
    const lat=(p.lat||0).toFixed(5);
    const lng=(p.lng||0).toFixed(5);
    const mapsUrl=`https://www.google.com/maps/@${lat},${lng},3a,75y,0h,90t/`;
    const isFake=p.pano_id.startsWith('pos_');
    const isDone=alreadyDone.includes(p.pano_id);
    const rowStyle=isFake?'color:var(--muted)':'';
    const doneTag=isDone?'<span style="font-size:.65rem;background:#1a3a25;color:#68a83f;border-radius:99px;padding:1px 6px;margin-left:4px">✓ angefragt</span>':'';
    const fakeTag=isFake?'<span style="font-size:.65rem;background:#2a2010;color:#c9813a;border-radius:99px;padding:1px 6px;margin-left:4px">fallback</span>':'';
    return `<tr style="${rowStyle}">
      <td class="cb-col"><input type="checkbox" ${p._selected?'checked':''} onchange="togglePano(${i},this.checked)"/></td>
      <td>${i+1}</td>
      <td><code style="font-size:.7rem">${escH(p.pano_id.substring(0,24))}</code>${doneTag}${fakeTag}</td>
      <td>${escH(p.date||'?')}</td>
      <td>${lat}</td>
      <td>${lng}</td>
      <td>
        <a href="${escH(mapsUrl)}" target="_blank" style="color:var(--primary);font-size:.75rem">↗</a>

/* ── CSV EXPORT ── */
function exportSelectedCSV(){
  const sel=foundPanos.filter(p=>p._selected);
  if(!sel.length){setStatus('Keine Panoramen ausgewählt.','warn');return;}

/* ── DOWNLOAD ── */
async function startDownload(m){
  const sel=foundPanos.filter(p=>p._selected);
  if(!sel.length){setStatus('Keine Panoramen ausgewählt. Bitte Checkboxen setzen.','warn');return;}
  if(!serverOnline&&m==='local'){setStatus('Server offline. streetview_server.py starten.','error');return;}
  const key=v('tok-google');if(!key){setStatus('API-Key fehlt.','error');return;}
  const qd=quotaData();
  const TILES={low:32,medium:128,high:512};
  const est=sel.length*(TILES[v('cfg-quality')]||128);
  const stopAt=Math.floor(qd.limit*(qd.stopPct||80)/100);
  if(qd.used+est>stopAt){setStatus(`Quota-Schutz: est. ${est} Tiles überschreiten Limit.`,'warn');return;}
  dbg(`Download: ${sel.length} ausgewählte Panoramen`,'info');
  if(m==='local')await dlLocal(key,sel);else await dlCloud(key,sel);
  qd.used+=est;saveQuotaData(qd);loadQuota();
}

async function dlLocal(key,sel){
  const streetRaw=v('street-input')||'';
  const parts=streetRaw.split(',').map(s=>s.trim()).filter(Boolean);
  const street=parts[0]||'';
  const city=parts.slice(1).join(', ')||'';
  const INVALID=['','unbekannt','karte','map','unknown'];
  if(INVALID.includes(street.toLowerCase())){
    setStatus('Kein Strassenname erkannt. Bitte im Karte-Tab "Suche" nutzen.','error');
    dbg('Download abgebrochen: kein gültiger Strassenname.','err');return;
  }
  const p={street,city,quality:v('cfg-quality'),sampling:v('cfg-sampling'),radius:v('cfg-radius'),historical:v('cfg-historical'),output:v('cfg-output'),api_key:key,pano_ids:sel.map(p=>p.pano_id)};
  dbg(`Download: street="${street}" city="${city}" quality=${p.quality} pano_ids=[${p.pano_ids.length}]`,'cmd');
  try{
    const r=await fetch(`${LOCAL_API}/api/start`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    const d=await r.json();
    if(!r.ok){setStatus(`Fehler: ${d.error}`,'error');return;}
    currentJobId=d.job_id;
    setStatus(`Job gestartet: ${d.job_id}`,'running');
    showTab('tab-debug');listenSSE(d.job_id);
  }catch(e){setStatus(`Fehler: ${e}`,'error');dbg(`${e}`,'err');}
}

let _cloudDispatching=false;
async function dlCloud(key,sel){
  if(_cloudDispatching){setStatus('Bitte warten, Request läuft...','warn');return;}
  const pat=v('tok-pat');
  if(!pat){setStatus('PAT fehlt.','error');showTab('tab-tokens');return;}
  const owner=v('cfg-owner')||'basecore';
  const repo=v('cfg-repo')||'streetview-explorer';
  const wf=v('cfg-workflow')||'download.yml';
  const br=v('cfg-branch')||'main';
  const streetRaw=v('street-input')||'';
  const parts=streetRaw.split(',').map(s=>s.trim()).filter(Boolean);
  const firstIsNumber=parts.length>0&&/^\d+$/.test(parts[0]);
  const street=firstIsNumber?(parts[1]||parts[0]):(parts[0]||'');
  const city=firstIsNumber?parts.slice(2).filter(p=>!/^\d{5}$/.test(p)&&p.length>3).slice(0,2).join(', '):parts.slice(1).filter(p=>!/^\d{5}$/.test(p)&&p.length>3).slice(0,2).join(', ');
  const realPanos=sel.filter(p=>!p.pano_id.startsWith('pos_'));
  const fakePanos=sel.filter(p=>p.pano_id.startsWith('pos_'));
  const alreadyDone=JSON.parse(localStorage.getItem('svex_dispatched_panos')||'[]');
  let toDispatch=realPanos.filter(p=>!alreadyDone.includes(p.pano_id));
  const dupCount=realPanos.length-toDispatch.length;
  if(dupCount>0){const skip=confirm(`${dupCount} Panoramen wurden bereits angefragt.\nTrotzdem erneut downloaden?`);if(skip)toDispatch=realPanos;}
  let dispatchLat='',dispatchLng='';
  const hasPanoIds=toDispatch.length>0;
  if(!hasPanoIds){
    if(fakePanos.length>0){dispatchLat=fakePanos[0].lat?.toFixed(6)||'';dispatchLng=fakePanos[0].lng?.toFixed(6)||'';}
    else if(hasPoint&&singleMarker){dispatchLat=singleMarker.getLatLng().lat.toFixed(6);dispatchLng=singleMarker.getLatLng().lng.toFixed(6);}
  }
  const hasCoords=!!dispatchLat;
  const hasStreet=street.length>2;
  if(!hasPanoIds&&!hasCoords&&!hasStreet){setStatus('Nichts zum Dispatchen: kein Strassenname, keine Koordinaten, keine pano_ids.','error');return;}
  const modeLabel=hasPanoIds?`${toDispatch.length} pano_ids`:(dispatchLat?`Koordinaten ${dispatchLat},${dispatchLng}`:`Strasse: ${street}`);
  dbg(`Cloud Dispatch: ${owner}/${repo} wf=${wf} Modus=${modeLabel}`,'cmd');
  dbg(`street="${street}" city="${city}" lat=${dispatchLat} lng=${dispatchLng}`,'info');
  const TILES_EST={low:32,medium:128,high:512};
  const qual=v('cfg-quality')||'medium';
  const hist=v('cfg-historical')==='true';
  const dispatchCount=hasPanoIds?toDispatch.length:1;
  const estTiles=Math.round(dispatchCount*(TILES_EST[qual]||128)*(hist?2.5:1));
  const estCost=(estTiles/1000*0.007).toFixed(3);
  dbg(`Tile-Schätzung: ${dispatchCount} Pano(s) × ${TILES_EST[qual]} Tiles${hist?' × 2.5 (historisch)':''} = ~${estTiles.toLocaleString()} Tiles (~$${estCost})`,'info');
  if(estTiles>10000){
        const ok=confirm(`⚠ Hoher Tile-Verbrauch!\n\nGeschätzt: ~${estTiles.toLocaleString()} Tiles (~$${estCost})\n\nTrotzdem fortfahren?`);
    if(!ok){dbg('Dispatch abgebrochen (Nutzer).','warn');return;}
  }
  _cloudDispatching=true;
  const inputs={
    api_key:key,
    quality:qual,
    sampling:v('cfg-sampling')||'10',
    radius:v('cfg-radius')||'8',
    historical:v('cfg-historical')||'false',
    output:v('cfg-output')||'./downloads',
    heading:v('cfg-heading')||'0',
    pitch:v('cfg-pitch')||'0',
    fov:v('cfg-fov')||'90',
    zoom:v('cfg-zoom')||'2',
    width:v('cfg-width')||'640',
    height:v('cfg-height')||'640',
    format:v('cfg-format')||'jpg',
    jpg_quality:v('cfg-jpg-quality')||'85',
    crop_left:v('cfg-crop-left')||'0',
    crop_right:v('cfg-crop-right')||'0',
    crop_top:v('cfg-crop-top')||'0',
    crop_bottom:v('cfg-crop-bottom')||'0',
    outdoor:v('cfg-outdoor')||'',
    source:v('cfg-source')||'',
    min_quality_score:v('cfg-min-quality-score')||'',
    max_dist:v('cfg-max-dist')||'',
    date_from:v('cfg-date-from')||'',
    date_to:v('cfg-date-to')||'',
    max_age:v('cfg-max-age')||'',
    max_results:v('cfg-maxresults')||'5',
    pause:v('cfg-pause')||'0.3'
  };
  if(hasPanoIds){
    inputs.pano_ids=toDispatch.map(p=>p.pano_id).join(',');
    inputs.street='';inputs.city='';inputs.lat='';inputs.lng='';
  } else if(hasCoords){
    inputs.lat=dispatchLat;inputs.lng=dispatchLng;inputs.street='';inputs.city='';inputs.pano_ids='';
  } else {
    inputs.street=street;inputs.city=city;inputs.lat='';inputs.lng='';inputs.pano_ids='';
  }
  try{
    const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/${wf}/dispatches`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${pat}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({ref:br,inputs})
    });
    if(r.status===204){
      if(hasPanoIds){
        const now=JSON.parse(localStorage.getItem('svex_dispatched_panos')||'[]');
        const merged=[...new Set([...now,...toDispatch.map(p=>p.pano_id)])];
        localStorage.setItem('svex_dispatched_panos',JSON.stringify(merged));
      }
      setStatus(`✓ ${modeLabel} an GitHub Actions geschickt!`,'success');
      dbg(`Dispatch OK: ${modeLabel}`,'ok');
      updatePanoBar();
      setTimeout(()=>loadCloudJobs(),3000);
    } else {
      const err=await r.text();
      setStatus(`GitHub Fehler ${r.status}: ${err}`,'error');
      dbg(`Dispatch Fehler ${r.status}: ${err}`,'err');
    }
  }catch(e){setStatus(`Fehler: ${e}`,'error');dbg(`${e}`,'err');}
  finally{_cloudDispatching=false;}
}

/* ── SERVER CHECK ── */
async function checkServer(){
  try{
    const r=await fetch(`${LOCAL_API}/api/status`,{signal:AbortSignal.timeout(1500)});
    serverOnline=r.ok;
  }catch{serverOnline=false;}
  const dots=[document.getElementById('srv-dot2')];

  dots.forEach(d=>{if(d){d.className='srv-dot'+(serverOnline?' online':' offline');}});
  labels.forEach(l=>{if(l)l.textContent=serverOnline?'Server online':'Server offline — nur Cloud/Browser-Modus';});
  document.getElementById('offline-banner').style.display=(!serverOnline&&mode==='local')?'block':'none';

/* ── SSE (Local Jobs) ── */
function listenSSE(jobId){
  if(currentES)currentES.close();
  currentES=new EventSource(`${LOCAL_API}/api/stream/${jobId}`);
  currentES.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      if(d.log)dbg(d.log,d.level||'log');
      if(d.status==='done'||d.status==='error'){currentES.close();currentES=null;loadLocalJobs();setStatus(d.status==='done'?'Download abgeschlossen ✓':'Fehler beim Download',d.status==='done'?'success':'error');}
    }catch{}
  };
  currentES.onerror=()=>{dbg('SSE Verbindung unterbrochen','warn');currentES.close();currentES=null;};
}

/* ── LOCAL JOBS ── */
async function loadLocalJobs(){
  await checkServer();
  const el=document.getElementById('local-jobs-list');
  if(!serverOnline){el.innerHTML='<p style="color:var(--muted)">Server offline.</p>';return;}
  try{
    const r=await fetch(`${LOCAL_API}/api/jobs`);
    const d=await r.json();
    const jobs=d.jobs||[];
    if(!jobs.length){el.innerHTML='<p style="color:var(--muted)">Noch keine Jobs.</p>';return;}
    el.innerHTML=jobs.slice().reverse().map(j=>{
      const cls={queued:'b-q',running:'b-r',done:'b-s',error:'b-f'}[j.status]||'b-q';
      return `<div class="run-entry">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
          <span style="font-family:monospace;font-size:.78rem">${escH(j.job_id)}</span>
          <span class="badge ${cls}">${escH(j.status)}</span>
        </div>
        ${j.progress!==undefined?`<div style="margin-top:6px;font-size:.75rem;color:var(--muted)">Fortschritt: ${j.progress}%</div>`:''}
        ${j.created?`<div style="font-size:.72rem;color:var(--faint);margin-top:2px">${new Date(j.created*1000).toLocaleString()}</div>`:''}
        ${j.status==='running'?`<button class="btn btn-danger" style="padding:5px 10px;font-size:.75rem;margin-top:6px" onclick="cancelJob('${j.job_id}')">&#9632; Abbrechen</button>`:''}
      </div>`;
    }).join('');

async function cancelJob(jobId){

  catch(e){dbg(`Fehler: ${e}`,'err');}
}

/* ── CLOUD JOBS ── */
let _cloudJobsRefreshTimer=null;
async function loadCloudJobs(){
  const pat=v('tok-pat');
  const owner=v('cfg-owner')||'basecore';
  const repo=v('cfg-repo')||'streetview-explorer';
  const el=document.getElementById('cloud-jobs-list');
  if(!pat){el.innerHTML='<p style="color:var(--muted)">PAT eingeben und speichern.</p>';return;}
  el.innerHTML='<p style="color:var(--muted)"><span class="spin"></span>Lade...</p>';
  try{
    const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?per_page=10`,{headers:{'Authorization':`Bearer ${pat}`,'Accept':'application/vnd.github+json'}});
    const d=await r.json();
    const runs=d.workflow_runs||[];
    if(!runs.length){el.innerHTML='<p style="color:var(--muted)">Noch keine Runs.</p>';return;}
    el.innerHTML=runs.map(run=>{
      const cls={queued:'b-q',in_progress:'b-r',completed:'b-s',failure:'b-f'}[run.status]||'b-q';
      const conclusionCls=run.conclusion==='failure'?'b-f':run.conclusion==='success'?'b-s':'b-q';
      return `<div class="run-entry">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
          <a href="${escH(run.html_url)}" target="_blank" style="font-size:.78rem;color:var(--primary);font-family:monospace">#${run.run_number} ${escH(run.name||run.display_title||'Run')}</a>
          <span class="badge ${run.conclusion?conclusionCls:cls}">${escH(run.conclusion||run.status)}</span>
        </div>
        <div style="font-size:.72rem;color:var(--faint);margin-top:2px">${new Date(run.created_at).toLocaleString()}</div>
        ${run.status==='in_progress'?`<button class="btn btn-danger" style="padding:5px 10px;font-size:.75rem;margin-top:6px" onclick="cancelCloudRun(${run.id})">&#9632; Abbrechen</button>`:''}
      </div>`;
    }).join('');
    const hasRunning=runs.some(r=>r.status==='in_progress'||r.status==='queued');
    if(hasRunning){_cloudJobsRefreshTimer=setTimeout(loadCloudJobs,8000);}
  }catch(e){el.innerHTML=`<p style="color:var(--error)">${escH(String(e))}</p>`;}
}
async function cancelCloudRun(runId){
  const pat=v('tok-pat');const owner=v('cfg-owner')||'basecore';const repo=v('cfg-repo')||'streetview-explorer';
  try{
    await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs/${runId}/cancel`,{method:'POST',headers:{'Authorization':`Bearer ${pat}`,'Accept':'application/vnd.github+json'}});
    dbg(`Cloud Run ${runId} abgebrochen`,'warn');setTimeout(loadCloudJobs,2000);
  }catch(e){dbg(`Fehler: ${e}`,'err');}
}

/* ── QUOTA ── */
function loadQuota(){
  const d=quotaData();
  const n=new Date();const cm=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  if(d.month!==cm){d.month=cm;d.used=0;saveQuotaData(d);}
  document.getElementById('quota-month').textContent=`Monat: ${d.month}`;
  document.getElementById('quota-limit').value=d.limit||100000;
  document.getElementById('quota-stop-pct').value=d.stopPct||80;
  document.getElementById('quota-manual').value=d.manualBase||0;
  const pct=Math.min(100,Math.round((d.used/(d.limit||100000))*100));
  const bar=document.getElementById('quota-bar');
  bar.style.width=pct+'%';bar.className='quota-bar'+(pct>=80?' danger':pct>=60?' warn':'');
  document.getElementById('quota-used-label').textContent=d.used.toLocaleString();
  document.getElementById('quota-pct-label').textContent=pct+'%';
  document.getElementById('quota-limit-label').textContent=(d.limit||100000).toLocaleString();
  document.getElementById('qs-used').textContent=d.used.toLocaleString();
  document.getElementById('qs-pct').textContent=pct+'%';
  document.getElementById('qs-remaining').textContent=Math.max(0,(d.limit||100000)-d.used).toLocaleString();
  const TILES={low:32,medium:128,high:512};
  document.getElementById('qs-panos').textContent=Math.floor(Math.max(0,(d.limit||100000)-d.used)/(TILES[v('cfg-quality')]||128)).toLocaleString();
}
function saveQuota(){
  const d=quotaData();
  d.limit=parseInt(document.getElementById('quota-limit').value)||100000;
  d.stopPct=parseInt(document.getElementById('quota-stop-pct').value)||80;
  d.manualBase=parseInt(document.getElementById('quota-manual').value)||0;
  d.used=d.manualBase;saveQuotaData(d);loadQuota();
  setStatus('Quota-Einstellungen gespeichert.','success');
}
function resetQuota(){
  const d=quotaData();d.used=d.manualBase||0;saveQuotaData(d);loadQuota();
  setStatus('Quota zurückgesetzt.','warn');
}
async function recalcQuotaFromGitHub(){
  const pat=v('tok-pat');const owner=v('cfg-owner')||'basecore';const repo=v('cfg-repo')||'streetview-explorer';
  if(!pat){setStatus('PAT fehlt für GitHub Sync.','warn');return;}
  dbg('GitHub Quota-Sync gestartet...','info');
  const TILES={low:32,medium:128,high:512};
  const n=new Date();const cm=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  try{
    const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?per_page=100&created=>=${cm}-01`,{headers:{'Authorization':`Bearer ${pat}`,'Accept':'application/vnd.github+json'}});
    const d=await r.json();
    let total=0;
    (d.workflow_runs||[]).forEach(run=>{if(run.conclusion==='success'||run.conclusion==='failure'){total+=(TILES['medium']||128);}});
    const qd=quotaData();qd.used=Math.max(qd.manualBase||0,total);saveQuotaData(qd);
    dbg(`GitHub Sync: ${(d.workflow_runs||[]).length} Runs, ~${total} Tiles geschätzt`,'ok');
    setStatus(`GitHub Sync OK: ~${total.toLocaleString()} Tiles`,'success');
  }catch(e){dbg(`GitHub Sync Fehler: ${e}`,'err');setStatus(`Sync Fehler: ${e}`,'error');}
}

      setStatus(`PAT ungültig: ${d.message}`,'error');dbg(`PAT Fehler: ${d.message}`,'err');
    }
  }catch(e){dot.className='tok-dot err';lbl.textContent=`${e}`;setStatus(`${e}`,'error');}
}

window.addEventListener('load',async()=>{
  dbg(`StreetView Explorer ${APP_VERSION} gestartet`,'info');

  dbg(isMobile?'Browser-Modus aktiv (kein lokaler Server nötig für Karte/Suche)':'Browser-Modus aktiv (kein lokaler Server nötig für Karte/Suche)','info');
  dbg('Für Downloads: python3 streetview_server.py starten','info');
  await loadAllKeys();
  setMode('local');
  loadQuota();
  checkServer();
  setInterval(checkServer,15000);
});
